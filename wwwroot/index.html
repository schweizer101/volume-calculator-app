<!DOCTYPE html>
<html>
<head>
    <title>Volume Calculator</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            margin: 80px auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00c6ff;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Volume Calculator</h1>
        <p>Semi-Cylindrical Tunnel Block</p>

        <form method="post" action="/calculate">
            <input type="number" step="any" name="length" placeholder="Length (L)" required>
            <input type="number" step="any" name="width" placeholder="Width (W)" required>
            <input type="number" step="any" name="height" placeholder="Height (H)" required>
            <input type="number" step="any" name="radius" placeholder="Radius (r)" required>

            <button type="submit">Calculate Volume</button>
        </form>

        <div class="footer">
            Powered by C# ASP.NET
        </div>
    </div>

</body>
</html>
